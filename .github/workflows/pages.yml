name: Deploy to GitHub Pages

# Equivalent to 'only: - main'
on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allows only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Equivalent to 'image: node:20'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Built-in caching equivalent to your 'cache: paths: - node_modules/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Equivalent to 'cp build/index.html build/404.html'
      # (We skip the 'mv build public' step because GitHub Actions can upload the build folder directly)
      - name: Prepare SPA routing fallback
        run: cp build/index.html build/404.html

      # Equivalent to the 'artifacts' block
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
